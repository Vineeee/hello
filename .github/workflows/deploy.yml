name: Deploy

# Déclenche le workflow sur:
# - Push de tags commençant par 'v' (ex: v1.0.0, v2.1.3)
# - Déclenchement manuel via l'interface GitHub Actions
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    name: Validation Pré-Déploiement
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère le code du repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configure Python 3.11
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Cache les dépendances pip
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/prod.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Installe les dépendances de production
    - name: Install production dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/prod.txt

    # 5. Vérifie la configuration de production
    - name: Check production settings
      env:
        DJANGO_SETTINGS_MODULE: config.settings.prod
        SECRET_KEY: 'temporary-secret-key-for-validation'
      run: |
        python manage.py check --deploy

    # 6. Collecte les fichiers statiques
    - name: Collect static files
      env:
        DJANGO_SETTINGS_MODULE: config.settings.prod
        SECRET_KEY: 'temporary-secret-key-for-validation'
      run: |
        python manage.py collectstatic --noinput

    # 7. Vérifie que les migrations sont à jour
    - name: Check migrations
      env:
        DJANGO_SETTINGS_MODULE: config.settings.prod
        SECRET_KEY: 'temporary-secret-key-for-validation'
      run: |
        python manage.py makemigrations --check --dry-run

    # 8. Affiche les informations de déploiement
    - name: Deployment info
      run: |
        echo "🚀 Validation réussie!"
        echo "📦 Version: ${{ github.ref_name }}"
        echo "🌍 Environment: ${{ github.event.inputs.environment || 'production' }}"
        echo ""
        echo "⚠️  PROCHAINES ÉTAPES:"
        echo "   - Configurer les secrets GitHub (DATABASE_URL, SECRET_KEY, etc.)"
        echo "   - Choisir une plateforme de déploiement (voir options ci-dessous)"
        echo ""

