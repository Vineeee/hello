name: Deploy

# Déclenche le workflow sur:
# - Push de tags commençant par 'v' (ex: v1.0.0, v2.1.3)
# - Déclenchement manuel via l'interface GitHub Actions
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    name: Validation Pré-Déploiement
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère le code du repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configure Python 3.11
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Cache les dépendances pip
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/prod.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Installe les dépendances de production
    - name: Install production dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/prod.txt

    # 5. Vérifie la configuration de production
    - name: Check production settings
      env:
        DJANGO_SETTINGS_MODULE: config.settings.prod
        SECRET_KEY: 'temporary-secret-key-for-validation'
      run: |
        python manage.py check --deploy

    # 6. Collecte les fichiers statiques
    - name: Collect static files
      env:
        DJANGO_SETTINGS_MODULE: config.settings.prod
        SECRET_KEY: 'temporary-secret-key-for-validation'
      run: |
        python manage.py collectstatic --noinput

    # 7. Vérifie que les migrations sont à jour
    - name: Check migrations
      env:
        DJANGO_SETTINGS_MODULE: config.settings.prod
        SECRET_KEY: 'temporary-secret-key-for-validation'
      run: |
        python manage.py makemigrations --check --dry-run

    # 8. Affiche les informations de déploiement
    - name: Deployment info
      run: |
        echo "✅ Validation réussie!"
        echo "📦 Version: ${{ github.ref_name }}"
        echo "🌍 Environment: ${{ github.event.inputs.environment || 'production' }}"
        echo "🚀 Déploiement sur Render.com en cours..."
        echo ""

  # deploy-heroku:
  #   name: Deploy to Heroku
  #   needs: validate
  #   runs-on: ubuntu-latest
  #   steps:
  #   - uses: actions/checkout@v4
  #   - uses: akhileshns/heroku-deploy@v3.13.15
  #     with:
  #       heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
  #       heroku_app_name: "your-app-name"
  #       heroku_email: "your-email@example.com"

  # deploy-railway:
  #   name: Deploy to Railway
  #   needs: validate
  #   runs-on: ubuntu-latest
  #   steps:
  #   - uses: actions/checkout@v4
  #   - uses: bervProject/railway-deploy@main
  #     with:
  #       railway_token: ${{ secrets.RAILWAY_TOKEN }}
  #       service: "your-service-name"

  deploy-render:
    name: Deploy to Render
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Render deployment
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        echo "🚀 Déclenchement du déploiement sur Render..."
        echo "📦 Version: ${{ github.ref_name }}"
        echo "🔗 Service ID: ${RENDER_SERVICE_ID:0:10}..."
        
        response=$(curl -s -w "\n%{http_code}" -X POST \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json")
        
        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | head -n-1)
        
        if [ "$http_code" -eq 201 ]; then
          echo "✅ Déploiement déclenché avec succès!"
          echo "📋 Suivez les logs sur: https://dashboard.render.com"
        else
          echo "❌ Erreur lors du déclenchement du déploiement"
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          exit 1
        fi

  # EXERCICE: Utiliser GitHub Environments pour staging/production
  # Pour activer:
  # 1. Allez dans Settings > Environments sur GitHub
  # 2. Créez les environments "staging" et "production"
  # 3. Configurez les protection rules (approbations, etc.)
  # 4. Ajoutez: environment: ${{ github.event.inputs.environment || 'production' }}
  #    dans le job deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
