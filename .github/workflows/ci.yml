name: CI

# Déclenche le workflow sur push et pull request vers la branche main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests et Couverture
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère le code du repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configure Python 3.11
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Cache les dépendances pip pour accélérer les builds
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Installe les dépendances
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt

    # 5. Exécute les migrations Django (vérification que les modèles sont OK)
    - name: Run migrations
      run: |
        python manage.py migrate

    # 6. Exécute les tests avec pytest et génère le rapport de couverture
    - name: Run tests with coverage
      run: |
        pytest --cov=apps --cov-report=term-missing --cov-report=html --cov-report=xml

    # 7. Upload le rapport de couverture HTML comme artifact
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/

    # 8. Upload le rapport XML pour intégration future avec Codecov/Coveralls
    - name: Upload coverage XML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-xml
        path: coverage.xml

    # EXERCICE: Intégrer Codecov pour visualiser la couverture
    # - name: Upload to Codecov
    #   uses: codecov/codecov-action@v4
    #   with:
    #     file: ./coverage.xml
    #     fail_ci_if_error: true

    # 9. Affiche un résumé des tests
    - name: Test Summary
      if: always()
      run: |
        echo "✅ Tests terminés avec succès!"
        echo "📊 Rapport de couverture disponible dans les artifacts"
